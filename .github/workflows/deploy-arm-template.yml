name: Deploy Full Stack via ARM Template

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'apps.json'
      - '.github/workflows/deploy-arm-template.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Validate required deployment secrets
        env:
          STUDENT_MONGO_URI: ${{ secrets.STUDENT_MONGO_URI }}
          TEACHER_MONGO_URI: ${{ secrets.TEACHER_MONGO_URI }}
          COURSE_MONGO_URI: ${{ secrets.COURSE_MONGO_URI }}
          RESULT_MONGO_URI: ${{ secrets.RESULT_MONGO_URI }}
          STUDENT_JWT_SECRET: ${{ secrets.STUDENT_JWT_SECRET }}
          RESOURCE_GROUP: ${{ secrets.RESOURCE_GROUP }}
        run: |
          required=(STUDENT_MONGO_URI TEACHER_MONGO_URI COURSE_MONGO_URI RESULT_MONGO_URI STUDENT_JWT_SECRET RESOURCE_GROUP)
          for item in "${required[@]}"; do
            if [ -z "${!item}" ]; then
              echo "Missing required secret: $item"
              exit 1
            fi
          done

      - name: Deploy ARM template with secure parameters
        uses: azure/cli@v2
        with:
          inlineScript: |
            az deployment group create \
              --resource-group "${{ secrets.RESOURCE_GROUP }}" \
              --template-file apps.json \
              --parameters \
                studentMongoUri="${{ secrets.STUDENT_MONGO_URI }}" \
                teacherMongoUri="${{ secrets.TEACHER_MONGO_URI }}" \
                courseMongoUri="${{ secrets.COURSE_MONGO_URI }}" \
                resultMongoUri="${{ secrets.RESULT_MONGO_URI }}" \
                studentJwtSecret="${{ secrets.STUDENT_JWT_SECRET }}"
