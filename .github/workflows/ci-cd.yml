name: SMS Microservices CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [student-service, teacher-service, course-service, result-service]

    steps:
    - uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Install dependencies
      run: |
        cd services/${{ matrix.service }}
        npm install

    - name: Run tests
      run: |
        cd services/${{ matrix.service }}
        npm test

    - name: Build Docker image
      run: |
        docker build -t sms-${{ matrix.service }}:latest services/${{ matrix.service }}
