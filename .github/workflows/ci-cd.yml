name: SMS Microservices CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [student-service, teacher-service, course-service, result-service]

    steps:
    - uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Install dependencies
      run: |
        cd services/${{ matrix.service }}
        npm install

    - name: Run Snyk to check for vulnerabilities
      uses: snyk/actions/node@master
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        args: --severity-threshold=high
        command: test

    - name: Build Docker image
      run: |
        docker build -t sms-${{ matrix.service }}:latest services/${{ matrix.service }}

    - name: Log in to Docker Hub
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Push Docker image to Docker Hub (Conditional)
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        if [ -z "${{ secrets.DOCKER_USERNAME }}" ]; then
          echo "DOCKER_USERNAME secret is required for push."
          exit 1
        fi

        IMAGE_TAG="${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:latest"
        docker tag sms-${{ matrix.service }}:latest "$IMAGE_TAG"
        docker push "$IMAGE_TAG"
